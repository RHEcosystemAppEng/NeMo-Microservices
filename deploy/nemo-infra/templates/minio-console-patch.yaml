{{- if .Values.install.customizer }}
# Enable embedded MinIO web console (port 9001) by patching deployment after install/upgrade.
# Chart hardcodes MINIO_BROWSER=off; we set it to "on" so no manual oc set env is needed.
apiVersion: batch/v1
kind: Job
metadata:
  name: nemo-infra-minio-console-patch
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "nemo-infra.labels" . | nindent 4 }}
    component: minio
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      serviceAccountName: nemo-infra-minio-console-patch
      restartPolicy: OnFailure
      containers:
      - name: patch
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/bash
        - -c
        - |
          set -e
          oc set env deployment/nemo-infra-minio MINIO_BROWSER=on -n {{ .Values.namespace.name | quote }} || true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nemo-infra-minio-console-patch
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "nemo-infra.labels" . | nindent 4 }}
    component: minio
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nemo-infra-minio-console-patch
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "nemo-infra.labels" . | nindent 4 }}
    component: minio
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  resourceNames: ["nemo-infra-minio"]
  verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nemo-infra-minio-console-patch
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "nemo-infra.labels" . | nindent 4 }}
    component: minio
subjects:
- kind: ServiceAccount
  name: nemo-infra-minio-console-patch
  namespace: {{ .Values.namespace.name }}
roleRef:
  kind: Role
  name: nemo-infra-minio-console-patch
  apiGroup: rbac.authorization.k8s.io
{{- end }}
