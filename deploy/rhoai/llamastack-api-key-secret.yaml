# Secret for LlamaStack VLLM API token.
# This is the token LlamaStack uses to call your inference endpoint (VLLM / KServe).
#
# --- What to use as the API key ---
# For OpenShift/RHOAI with KServe InferenceService, use the ServiceAccount token
# of the InferenceService that serves the model (e.g. redhataillama-31-8b-instruct).
#
# 1) Create the token (run this, then copy the printed token):
#    export NAMESPACE=anemo-rhoai
#    oc create token redhataillama-31-8b-instruct-sa -n $NAMESPACE --duration=8760h
#
#    If your InferenceService has a different name, use:
#    oc get inferenceservice -n $NAMESPACE
#    oc create token <INFERENCESERVICE_NAME>-sa -n $NAMESPACE --duration=8760h
#
# 2) Create the secret with that token (paste the token where it says YOUR_TOKEN):
#    oc create secret generic copilot-llama-stack-api-key -n $NAMESPACE \
#      --from-literal=api_key='YOUR_TOKEN'
#
# Or edit the stringData.api_key below and: oc apply -f deploy/rhoai/llamastack-api-key-secret.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: copilot-llama-stack-api-key
  namespace: anemo-rhoai
